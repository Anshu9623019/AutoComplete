server:
  port: 8080

spring:
  application:
    name: autocomplete-service

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true


  datasource:
    url: jdbc:postgresql://localhost:5432/autocomplete_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update   # use 'validate' in prod
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

